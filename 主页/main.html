<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九天星枢 | 个人端口矩阵</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 视差云层背景 -->
    <div class="parallax-bg layer-mountains"></div>
    <div class="parallax-bg layer-clouds"></div>

    <!-- Three.js 3D 容器 (法阵与粒子) -->
    <canvas id="webgl-canvas"></canvas>

    <!-- 现代 UI 与书法结合的端口界面 -->
    <main class="ui-container">
        <header>
            <h1 class="calligraphy-title">九天星枢</h1>
            <p class="modern-subtitle">ALL SYSTEMS ONLINE // 灵气充盈</p>
        </header>

        <div class="ports-grid">
            <!-- 将你的各个服务映射为仙侠风的阵眼 -->
            <a href="#" class="port-card" data-hover="飞剑传书">
                <div class="port-icon">⚔️</div>
                <div class="port-info">
                    <h2>剑冢 · 本地算力</h2>
                    <span>Ollama Local Engine</span>
                </div>
            </a>
            
            <a href="#" class="port-card" data-hover="万法归宗">
                <div class="port-icon">📜</div>
                <div class="port-info">
                    <h2>藏经阁 · 代码核心</h2>
                    <span>GitLab Workspace</span>
                </div>
            </a>

            <a href="#" class="port-card" data-hover="星辰衍算">
                <div class="port-icon">🌌</div>
                <div class="port-info">
                    <h2>星阵 · 模型路由</h2>
                    <span>OpenRouter API</span>
                </div>
            </a>

            <a href="#" class="port-card" data-hover="夺天地造化">
                <div class="port-icon">🔥</div>
                <div class="port-info">
                    <h2>炼丹炉 · 云端部署</h2>
                    <span>Baseten Cloud</span>
                </div>
            </a>

            <a href="#" class="port-card" data-hover="海纳百川">
                <div class="port-icon">🌊</div>
                <div class="port-info">
                    <h2>灵泉 · 开源社区</h2>
                    <span>Hugging Face</span>
                </div>
            </a>
        </div>
    </main>

    <!-- 引入 Three.js 和 GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
