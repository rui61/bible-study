<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九天星枢 · 端口矩阵</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="bg-three"></canvas>
<div class="parallax-layer clouds-far" data-depth="0.02"></div>
<div class="parallax-layer clouds-near" data-depth="0.05"></div>
<div class="parallax-layer mtn-far" data-depth="0.03"></div>
<div class="parallax-layer mtn-near" data-depth="0.07"></div>
<div class="parallax-layer palace" data-depth="0.10"></div>

<div class="head">
    <div class="head-title">
        <div class="brand">九天星枢</div>
        <div class="sub">ALL SYSTEMS ONLINE · 灵 气 充 盈</div>
    </div>
    <div class="head-clock">
        <div class="shichen" id="shichen">—</div>
        <div class="time" id="clockTime">--:--:--</div>
    </div>
</div>

<main id="panelRoot"></main>

<div class="note">
    <b>说明</b> — 每个法门对应一处服务，状态：online（朱印常明）、standby（金边虚印）、offline（灰边淡印）。
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="main.js"></script>
</body>
</html>
